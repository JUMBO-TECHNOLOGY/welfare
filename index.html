<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福利委員會特約店家</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif; background: #f4f4f4; }

  .hero { background: #1a1a2e; padding: 28px 20px 20px; }
  .hero h1 { color: #fff; font-size: 23px; font-weight: 600; margin-bottom: 4px; }
  .hero p  { color: rgba(255,255,255,0.55); font-size: 14px; margin-bottom: 16px; }
  .search-wrap { display: flex; gap: 8px; }
  .search-box { flex: 1; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; padding: 10px 14px; }
  .search-box input { background: transparent; border: none; outline: none; color: #fff; font-size: 14px; flex: 1; font-family: inherit; }
  .search-box input::placeholder { color: rgba(255,255,255,0.4); }
  .search-box svg { flex-shrink: 0; }
  .search-btn { background: #1D9E75; border: none; border-radius: 10px; padding: 10px 16px; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }

  .filter-section { background: #fff; border-bottom: 1px solid #eee; }
  .filter-label { font-size: 11px; color: #aaa; padding: 10px 16px 2px; font-weight: 500; }
  .cats { display: flex; gap: 8px; padding: 4px 16px 10px; overflow-x: auto; scrollbar-width: none; }
  .cats::-webkit-scrollbar { display: none; }
  .cat { padding: 5px 14px; border-radius: 20px; font-size: 12px; border: 1px solid #ddd; white-space: nowrap; cursor: pointer; background: #fff; color: #555; transition: all .15s; flex-shrink: 0; }
  .cat.active { background: #1D9E75; border-color: #1D9E75; color: #fff; }
  .cat.active-region { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }

  .count-bar { padding: 8px 16px 0; font-size: 12px; color: #888; }
  .list { padding: 10px 16px 80px; display: flex; flex-direction: column; gap: 10px; }

  .card { background: #fff; border-radius: 14px; padding: 14px 16px; border: 1px solid #eee; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .card-name { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 5px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 9px; border-radius: 10px; font-weight: 500; }
  .badge-cat    { background: #E1F5EE; color: #085041; }
  .badge-area   { background: #f0f0f0; color: #555; }
  .badge-region { background: #E6F1FB; color: #0C447C; }
  .btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .btn-link { display: flex; align-items: center; gap: 4px; font-size: 11px; padding: 6px 10px; border-radius: 8px; text-decoration: none; white-space: nowrap; font-weight: 500; }
  .btn-map      { background: #E1F5EE; color: #085041; }
  .btn-contract { background: #E6F1FB; color: #0C447C; }
  .deal { background: #f8f8f8; border-radius: 8px; padding: 9px 12px; font-size: 12px; color: #444; line-height: 1.6; }
  .deal-label { color: #1D9E75; font-weight: 600; margin-right: 4px; }

  .empty { text-align: center; padding: 48px 20px; color: #aaa; font-size: 14px; }
  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
  .loading-title { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .progress-wrap { width: 200px; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; }
  .progress-bar { height: 100%; background: #1D9E75; border-radius: 10px; animation: progress 4.5s ease-out forwards; }
  @keyframes progress { 0%{width:0%} 60%{width:75%} 90%{width:90%} 100%{width:95%} }
  .loading-dots { display: flex; gap: 6px; }
  .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; animation: bounce 1.2s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<div class="hero">
  <h1>JUMBO特約店家查詢</h1>
  <p>持員工證即享專屬優惠</p>
  <div class="search-wrap">
    <div class="search-box">
      <svg width="14" height="14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" placeholder="搜尋店名、地區或優惠內容…" oninput="filterStores()">
    </div>
    <button class="search-btn" onclick="filterStores()">搜尋</button>
  </div>
</div>

<div class="filter-section">
  <div class="filter-label">類別</div>
  <div class="cats" id="catBar"></div>
  <div class="filter-label">區域</div>
  <div class="cats" id="regionBar"></div>
</div>

<div class="count-bar" id="countBar"></div>
<div class="list" id="storeList">
  <div class="loading-wrap">
    <div class="loading-title">載入中 請稍後</div>
    <div class="progress-wrap"><div class="progress-bar"></div></div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbw1jD92JkrY2UkHnFpewwTP9EYZDvo71970-KSZO0NLBRgmJrHLbEKioSbRiRAUiR8t/exec";
var allStores = [];
var activeCat = "全部";
var activeRegion = "全部";

function g(row, keys) {
  for (var i = 0; i < keys.length; i++) {
    if (row[keys[i]] !== undefined && String(row[keys[i]]).trim() !== "") return String(row[keys[i]]).trim();
  }
  return "";
}

async function loadStores() {
  try {
    var res = await fetch(API_URL);
    var data = await res.json();
    allStores = data.filter(function(r) { return g(r, ["店家名稱"]); });
    buildCats();
    buildRegions();
    renderStores(allStores);
  } catch(e) {
    document.getElementById("storeList").innerHTML = '<div class="empty">資料載入失敗，請稍後再試</div>';
  }
}

function buildCats() {
  var cats = ["全部"];
  allStores.forEach(function(s) {
    var c = g(s, ["類別"]);
    if (c && cats.indexOf(c) === -1) cats.push(c);
  });
  document.getElementById("catBar").innerHTML = cats.map(function(c) {
    return '<div class="cat' + (c === "全部" ? " active" : "") + '" onclick="setCat(\'' + c + '\')">' + c + '</div>';
  }).join("");
}

function buildRegions() {
  var regions = ["全部"];
  allStores.forEach(function(s) {
    var r = g(s, ["區域"]);
    if (!r) return;
    r.split(/[,，.。、]/).forEach(function(part) {
      part = part.trim();
      if (part && regions.indexOf(part) === -1) regions.push(part);
    });
  });
  var order = ["全部","全省","北部","中部","南部","東部","離島"];
  regions.sort(function(a,b) {
    var ia = order.indexOf(a), ib = order.indexOf(b);
    if (ia === -1) ia = 99;
    if (ib === -1) ib = 99;
    return ia - ib;
  });
  document.getElementById("regionBar").innerHTML = regions.map(function(r) {
    return '<div class="cat' + (r === "全部" ? " active-region" : "") + '" onclick="setRegion(\'' + r + '\')">' + r + '</div>';
  }).join("");
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll("#catBar .cat").forEach(function(el) {
    el.classList.toggle("active", el.textContent === cat);
  });
  filterStores();
}

function setRegion(region) {
  activeRegion = region;
  document.querySelectorAll("#regionBar .cat").forEach(function(el) {
    el.classList.toggle("active-region", el.textContent === region);
  });
  filterStores();
}

function filterStores() {
  var q = document.getElementById("searchInput").value.trim().toLowerCase();
  var filtered = allStores.filter(function(s) {
    var cat    = g(s, ["類別"]);
    var region = g(s, ["區域"]);
    var name   = g(s, ["店家名稱"]);
    var deal   = g(s, ["優惠內容"]);
    var area   = g(s, ["地區"]);
    var matchCat = activeCat === "全部" || cat === activeCat;
    var matchRegion = activeRegion === "全部" || region.indexOf(activeRegion) !== -1;
    var matchQ = !q || name.toLowerCase().includes(q) || deal.toLowerCase().includes(q) || area.toLowerCase().includes(q);
    return matchCat && matchRegion && matchQ;
  });
  renderStores(filtered);
}

function renderStores(list) {
  document.getElementById("countBar").textContent = "共 " + list.length + " 家";
  if (!list.length) {
    document.getElementById("storeList").innerHTML = '<div class="empty">找不到符合的店家，試試其他關鍵字</div>';
    return;
  }
  document.getElementById("storeList").innerHTML = list.map(function(s) {
    var name     = g(s, ["店家名稱"]);
    var cat      = g(s, ["類別"]);
    var region   = g(s, ["區域"]);
    var area     = g(s, ["地區"]);
    var deal     = g(s, ["優惠內容"]);
    var map      = g(s, ["地圖連結"]);
    var contract = g(s, ["合約連結"]);
    return '<div class="card">' +
      '<div class="card-top">' +
        '<div>' +
          '<div class="card-name">' + esc(name) + '</div>' +
          '<div class="badges">' +
            (cat    ? '<span class="badge badge-cat">'    + esc(cat)    + '</span>' : '') +
            (area   ? '<span class="badge badge-area">'   + esc(area)   + '</span>' : '') +

          '</div>' +
        '</div>' +
        '<div class="btns">' +
          (map      ? '<a class="btn-link btn-map"      href="' + esc(map)      + '" target="_blank"><svg width="12" height="12" fill="none" stroke="#085041" stroke-width="2" viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>導航</a>' : '') +
          (contract ? '<a class="btn-link btn-contract" href="' + esc(contract) + '" target="_blank"><svg width="12" height="12" fill="none" stroke="#0C447C" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>合約</a>' : '') +
        '</div>' +
      '</div>' +
      '<div class="deal"><span class="deal-label">優惠：</span>' + esc(deal) + '</div>' +
    '</div>';
  }).join("");
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

loadStores();
</script>
</body>
</html>
